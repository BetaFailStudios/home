<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nutrition Mission</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
        <!-- Jquery <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> -->
    </head>
    <body>
        <style>
            body {
                background-color: #222;
                margin: auto;
                height: 100%;
                overflow: hidden;
                cursor: none;
            }

            .share-tech-regular {
                font-family: "Share Tech", sans-serif;
                font-weight: 400;
                font-style: normal;
            }
        </style>
        <canvas id="gameScreen" width="1800" height="1000" onmousemove="xy(event)" ></canvas>
        <p id="fps">60</p>
        <script>
            //canvas or gamescreen
            var canvas = document.getElementById("gameScreen");
            //context, for drawing
            var ctx = canvas.getContext("2d");
            //settings canvas size and scale
            var screenScale = window.innerWidth / canvas.width
            if (window.innerHeight / canvas.height < screenScale)
                screenScale = window.innerHeight / canvas.height;

            var stop = false;
            var frameCount = 0;
            var fps, fpsInterval, startTime, now, then, elapsed;
            function startAnimating(fps) {
                fpsInterval = 1000 / fps;
                then = Date.now();
                startTime = then;
                animate();
            }
            function animate() {
                requestAnimationFrame(animate)
                now = Date.now();
                elapsed = now - then;
                if (elapsed > fpsInterval) {
                    then = now - (elapsed % fpsInterval);
                    tickloop();
                }
            }
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            ctx.translate(window.innerWidth/2,window.innerHeight/2);

            ctx.scale(screenScale, screenScale);

            var filterStrength = 10;
            //used  to be 20
            var frameTime = 0, lastLoop = new Date, thisLoop;
            var fpsOut = document.getElementById('fps');

            // Report the fps only every second, to only lightly affect measurements
            setInterval(function() {
                fpsOut.innerHTML = (1000 / frameTime).toFixed(1);
                game.fps = Math.max(30, Number(fpsOut.innerHTML));
            }, 1000);

            const keys = [];
            const mouse = { x: 0, y: 0 };
            
            window.addEventListener('mousedown', function () {
                game.input = false;

                if (Math.abs(mouse.y+130) < 20) {
                    if (Math.abs(mouse.x+150) < 150) game.input = "type";
                    else if (Math.abs(mouse.x-150) < 150) game.input = "amount";
                    else if (Math.abs(mouse.x+350) < 20) {
                        foods.push(new Food(inputType,inputAmount));
                        inputType = "";
                        inputAmount = "";
                    };
                }

                keys.mouse = true;
                mouse.down = true;
            }, false);
            window.addEventListener('mouseup', function () {
                keys.mouse = false;
                mouse.down = false;
            }, false);
            function xy(e) {
                game.menuSelectType = "mouse";

                mouse.x = e.x/screenScale - (window.innerWidth-1800*screenScale)/2/screenScale -900;
                mouse.y = e.y/screenScale - (window.innerHeight-1000*screenScale)/2/screenScale -500;
            }

            //detect keypresses
            window.addEventListener('keydown', function(e) {
                if (!e.repeat) {
                    const key = e.key.toLowerCase();
                    if (!keys.includes(key))
                        keys.push(key);
                }
                
                if (e.key == "Enter") {
                    foods.push(new Food(inputType,inputAmount));
                    inputType = "";
                    inputAmount = "";
                    game.input = "type";
                };

                if (e.key == "Tab"){
                    game.tick = 0;
                    e.preventDefault();
                    if (game.input == "type") game.input = "amount";
                    else game.input = "type"
                }

                if (e.key.length == 1) if (game.input == "type") inputType += e.key;
                else if (game.input == "amount") inputAmount += e.key;
                if (e.key == "Backspace" || e.key == "Delete") if (game.input == "type") inputType = inputType.slice(0,inputType.length-1);
                else if (game.input == "amount") inputAmount = inputAmount.slice(0,inputAmount.length-1);
            }, false);
            window.addEventListener('keyup', function(e) {
                const key = e.key.toLowerCase();
                while (keys.includes(key)) {
                    keys.splice(keys.indexOf(key), 1);
                }
            }, false);

            ctx.lineWidth = 3;

            const game = {
                fps: 60,
                tick: 0,
                input: false
            }

            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            //ctx.lineCap = 'round'; // reduced performance

            // uses "startanimating" instead of setInterval on firefox (does not work well with setinterval)
            if(navigator.userAgent.toLowerCase().includes("firefox"))
                startAnimating(60);
            else setInterval( () => { tickloop() }, 16.66);

            const referenceSheet = {
                Mango: [ false, 202 ],
                Potato: [ false, 135 ],
                Rice: [ true, 1.3 ],
                Spirulina: [ true, 3 ],
            }

            class Food {
                constructor(type,amount) {
                    this.type = type[0].toUpperCase() + type.slice(1).toLowerCase();
                    if (!referenceSheet[this.type]) referenceSheet[this.type] = [amount[amount.length-1].toLowerCase() == "g", Number(prompt("Calories in 1: ")) ];
                    if (!referenceSheet[this.type][0]) this.calories = referenceSheet[this.type][1] * eval(amount);
                    else this.calories = referenceSheet[this.type][1] * eval(amount.slice(0,amount.length-1));
                    this.date = new Date(Date.now());
                }
            }

            let inputType = "";
            let inputAmount = "";

            const foods = [];

            function tickloop() {
                game.tick++;
                if (game.tick > 200) game.tick -= 200;
                //check frameRate
                var thisFrameTime = (thisLoop = new Date) - lastLoop;
                frameTime += (thisFrameTime - frameTime) / filterStrength;
                lastLoop = thisLoop;

                ctx.fillStyle = "#008023";
                ctx.beginPath();
                ctx.fillRect(850, -450, -1700, 900);

                ctx.fillStyle = "#fff";
                ctx.font = "100px share tech";
                ctx.fillText("Nutrition Mission", 0,-300);
                
                ctx.beginPath();
                ctx.fillStyle = "#66c758";
                ctx.arc(-350,-130,20,0,Math.PI*2);
                ctx.rect(-300,-150,295,40);
                ctx.rect(10,-150,295,40);
                ctx.fill();

                ctx.fillStyle = "#fff";
                ctx.font = "25px share tech";

                ctx.fillRect(-352.5,-140,5,20);
                ctx.fillRect(-360,-132.5,20,5);
                if (game.input == "type") { if ((game.tick/20)%2 < 1) ctx.fillText(inputType + "|", -150,-130);
                else ctx.fillText(inputType + " ", -150,-130);
                } else if (inputType) ctx.fillText(inputType, -150,-130);
                else ctx.fillText("Type of food", -150,-130);

                if (game.input == "amount") { if ((game.tick/20)%2 < 1) ctx.fillText(inputAmount + "|", 150,-130);
                else ctx.fillText(inputAmount + " ", 150,-130);
                } else if (inputAmount) ctx.fillText(inputAmount, 150,-130);
                else ctx.fillText("Amount", 150,-130);

                ctx.fillText("Food", -150,-80);
                ctx.fillText("Calories", 150,-80);

                ctx.font = "40px share tech";
                ctx.fillText("Registered foods",-600,-300);
                ctx.font = "25px share tech";
                Object.keys(referenceSheet).forEach( (item,i) => {
                    if (referenceSheet[item][0]) ctx.fillText(item + " in g", -600,-250 + 30*i);
                    else ctx.fillText(item, -600,-250 + 30*i);
                })
                
                let calorieCount = 0; 

                foods.forEach((food,i) => {
                    ctx.beginPath();
                    ctx.fillStyle = "#66c758";
                    ctx.rect(-300,-20+80*i,295,40);
                    ctx.rect(10,-20+80*i,295,40);
                    ctx.fill();

                    calorieCount += food.calories;

                    ctx.fillStyle = "#fff";
                    ctx.font = "25px share tech";
                    ctx.fillText(food.type, -150,80*i);
                    ctx.fillText(food.calories, 150,80*i);
                    ctx.font = "20px share tech";
                    ctx.fillText(food.date, 0,40+80*i);
                })
                
                ctx.font = "20px share tech";

                ctx.fillText("Total: " + calorieCount, 150,-50);
                
                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.rect(-2500, -1750, 5000, 3500);
                ctx.rect(850, -450, -1700, 900);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(mouse.x,mouse.y);
                ctx.lineTo(mouse.x+20,mouse.y+10);
                ctx.lineTo(mouse.x+10,mouse.y+20);
                ctx.closePath();
                ctx.fillStyle = "#fff";
                ctx.strokeStyle = "#008023";
                ctx.stroke();
                ctx.fill();
            }
        </script>
    </body>
</html>
